<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pronote Élève</title>
    <style>
        :root { --primary: #1565c0; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .card { background: white; max-width: 450px; margin: auto; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .hidden { display: none; }
        select, input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; }
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }
        .badge { font-size: 0.75em; padding: 4px 10px; border-radius: 12px; font-weight: bold; margin-left: 10px; }
        .badge-devoir { background: #e3f2fd; color: #1565c0; }
        .badge-compo { background: #fff3e0; color: #ef6c00; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        td { padding: 15px 10px; border-bottom: 1px solid #eee; }
        .note-val { font-weight: bold; text-align: right; }
        .moyenne-box { background: #f8f9fa; padding: 15px; border-radius: 10px; text-align: center; margin-bottom: 20px; font-size: 1.5em; font-weight: bold; }
    </style>
</head>
<body>

    <div id="auth-view" class="card">
        <h2>Espace Élève</h2>
        <label>Choisis ton nom :</label>
        <select id="selectNom">
            <option value="">-- Sélectionner --</option>
            <option value="messaoudene nazim">messaoudene nazim</option>
            <option value="sari ayla nour">sari ayla nour</option>
            <option value="boumaiza nassila">boumaiza nassila</option>
            <option value="boudegna assia">boudegna assia</option>
            <option value="mouawiya salah">mouawiya salah</option>
            <option value="chalal ihsane">chalal ihsane</option>
            <option value="ait hamouda asma">ait hamouda asma</option>
            <option value="chabi wael">chabi wael</option>
            <option value="boudjemaa melissa">boudjemaa melissa</option>
            <option value="bediar yehya">bediar yehya</option>
            <option value="hamaidi neimat allah">hamaidi neimat allah</option>
            <option value="benarous rihab">benarous rihab</option>
            <option value="ouldaher kenzy">ouldaher kenzy</option>
            <option value="bensalem anes">bensalem anes</option>
            <option value="abderahmane talia">abderahmane talia</option>
            <option value="yigit cnar bacharmak">yigit cnar bacharmak</option>
            <option value="laredj adem">laredj adem</option>
            <option value="smahi ryad">smahi ryad</option>
            <option value="ait hamouda selma">ait hamouda selma</option>
            <option value="benachour abdnasser">benachour abdnasser</option>
        </select>
        <input type="password" id="inputPin" placeholder="Code PIN (4 chiffres)">
        <button onclick="connexion()">Voir mes notes</button>
    </div>

    <div id="notes-view" class="card hidden">
        <h3 id="displayNom" style="text-transform: uppercase; text-align:center;"></h3>
        <div class="moyenne-box" id="moyenneGen">-- / 10</div>
        <table><tbody id="bodyNotes"></tbody></table>
        <button onclick="localStorage.clear(); location.reload();" style="background:#666; margin-top:20px;">Déconnexion</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBLG2qLWb4pDe4XXFkbmsBIe6DdOdXoFVQ",
            authDomain: "naznour-dade9.firebaseapp.com",
            projectId: "naznour-dade9",
            storageBucket: "naznour-dade9.firebasestorage.app",
            messagingSenderId: "913597743014",
            appId: "1:913597743014:web:26b2c787ccd05918605967"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        if(localStorage.getItem('pronote_user')) loadDashboard(localStorage.getItem('pronote_user'));

        window.connexion = async () => {
            const nom = document.getElementById('selectNom').value;
            const pin = document.getElementById('inputPin').value;

            if(!nom || pin.length < 4) return alert("Sélectionnez votre nom et entrez votre PIN");

            const userRef = doc(db, "users", nom);
            const userSnap = await getDoc(userRef);

            if(userSnap.exists()) {
                if(userSnap.data().pin === pin) autoriser(nom);
                else alert("PIN incorrect");
            } else {
                await setDoc(userRef, { nom: nom, pin: pin });
                autoriser(nom);
            }
        };

        function autoriser(nom) {
            localStorage.setItem('pronote_user', nom);
            loadDashboard(nom);
        }

        function loadDashboard(nom) {
            document.getElementById('auth-view').classList.add('hidden');
            document.getElementById('notes-view').classList.remove('hidden');
            document.getElementById('displayNom').innerText = nom;

            const q = query(collection(db, "grades"), where("nomComplet", "==", nom));
            onSnapshot(q, (snap) => {
                let html = ""; let pts = 0; let coef = 0;
                snap.forEach(doc => {
                    const d = doc.data();
                    const isCompo = d.type === 'Composition';
                    const c = isCompo ? 2 : 1;
                    pts += (d.note * c); coef += c;
                    html += `<tr><td>${d.matiere} <span class="badge ${isCompo?'badge-compo':'badge-devoir'}">${d.type}</span></td>
                             <td class="note-val" style="color:${d.note>=5?'green':'red'}">${d.note}/10</td></tr>`;
                });
                document.getElementById('bodyNotes').innerHTML = html || "<tr><td>Aucune note</td></tr>";
                if(coef > 0) document.getElementById('moyenneGen').innerText = (pts/coef).toFixed(2) + " / 10";
            });
        }
    </script>
</body>
</html>
